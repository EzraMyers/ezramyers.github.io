<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Works | Ezra Myers</title>

<style>
html {
  overflow-y: scroll;
  scrollbar-gutter: stable;
}

body {
  margin: 0;
  background: #f6f6f4;
  font-family: "Times New Roman", serif;
  color: #2f2f2f;
}

nav {
  text-align: center;
  padding: 28px 0 22px;
  letter-spacing: 2px;
  font-size: 11px;
}

nav a {
  margin: 0 18px;
  text-decoration: none;
  color: #3a3a3a;
}

.works {
  text-align: center;
  padding-bottom: 120px;
}

.work {
  margin-bottom: 170px;
}

.work img {
  width: 62%;
  max-width: 860px;
}

.work.head img {
  width: 48%;
  max-width: 640px;
}

/* 🔥 FADE IN EFFECT */
.caption {
  font-size: 12px;
  line-height: 1.8;
  color: #5a5a5a;
  margin-top: 18px;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.caption.visible {
  opacity: 1;
}

.title {
  font-style: italic;
  font-size: 18px;
  margin-bottom: 6px;
}

@media (max-width: 900px) {
  .work img { width: 82%; }
  .work.head img { width: 72%; }
}
</style>

</head>

<body>

<nav>
  <a href="index.html">HOME</a>
  <a href="works.html">WORKS</a>
  <a href="about.html">ABOUT</a>
  <a href="contact.html">CONTACT</a>
</nav>

<div class="works">

  <div class="work">
    <img src="pay-the-devil.jpg">
    <div class="caption">
      <div class="title">Pay the Devil (Jab Jab)</div>
      <div>Ink, charcoal, collage, and gold leaf on Bockingford watercolour paper</div>
      <div>Life-size (cropped detail)</div>
      <div>2026</div>
    </div>
  </div>

  <div class="work">
    <img src="mary-in-the-light.jpg">
    <div class="caption">
      <div class="title">Mary in the Light</div>
      <div>Ink, charcoal, and collage on Bockingford watercolour paper</div>
      <div>Life-size</div>
      <div>2019</div>
    </div>
  </div>

  <div class="work head">
    <img src="head-study.jpg">
    <div class="caption">
      <div class="title">Head Study I</div>
      <div>Ink and collage on watercolour paper</div>
      <div>2015</div>
    </div>
  </div>

</div>

<script>
// Fade captions in when visible
const captions = document.querySelectorAll('.caption');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, {
  threshold: 0.3
});

captions.forEach(caption => {
  observer.observe(caption);
});
</script>

</body>
</html>
