<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ezra Myers</title>

<style>
html {
  overflow-y: scroll;
  scrollbar-gutter: stable;
}

body {
  margin: 0;
  background: #f6f6f4;
  font-family: "Times New Roman", serif;
  color: #2f2f2f;
  opacity: 0;
  transition: opacity 0.4s ease;
}

body.fade-in {
  opacity: 1;
}

nav {
  text-align: center;
  padding: 28px 0 22px;
  letter-spacing: 2px;
  font-size: 11px;
}

nav a {
  margin: 0 18px;
  text-decoration: none;
  color: #8a8a8a;
  font-weight: 400;
}

nav a.active {
  color: #1f1f1f;
}

.hero {
  width: 100%;
  text-align: center;
  padding: 40px 0 80px;
}

.hero img {
  width: 62%;
  max-width: 860px;
  height: auto;
  display: block;
  margin: 0 auto;
}

.name {
  position: fixed;
  right: 40px;
  bottom: 28px;
  font-size: 12px;
  letter-spacing: 3px;
}

@media (max-width: 900px) {
  .hero img {
    width: 82%;
  }

  .name {
    position: static;
    text-align: center;
    padding: 0 0 30px;
    display: block;
  }
}
</style>
</head>

<body>

<nav>
  <a href="index.html" class="active">HOME</a>
  <a href="works.html">WORKS</a>
  <a href="about.html">ABOUT</a>
  <a href="contact.html">CONTACT</a>
</nav>

<div class="hero">
  <img src="pay-the-devil.jpg" alt="Pay the Devil">
</div>

<div class="name">EZRA MYERS</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.body.classList.add("fade-in");
});

document.querySelectorAll('a').forEach(link => {
  const href = link.getAttribute('href');
  if (!href || href.startsWith('mailto:') || href.startsWith('#')) return;

  link.addEventListener('click', function(e) {
    e.preventDefault();
    const target = this.href;
    document.body.classList.remove('fade-in');
    setTimeout(() => {
      window.location.href = target;
    }, 300);
  });
});
</script>

</body>
</html>
